<!DOCTYPE html>
<!-- <html> 元素，又被視為根元素（root element），包含了所有顯示在這個頁面上的內容 。-->
<html>

<!-- <head> 元素裡面放的是你想涵括的重要資訊，但不會顯示於網頁瀏覽者眼前的。例如，顯示於搜尋結果的關鍵字、頁面說明、CSS、字元實體集...等。-->

<head>
    <!-- 設定字元編碼 -->
    <meta charset="utf-8">
    <!-- 載入CSS -->
    <link href="styles/style.css" rel="stylesheet" type="text/css">
    <!-- 載入字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Akaya+Telivigala&family=Merriweather:wght@300&family=Shizuru&display=swap" rel="stylesheet">
</head>

<!-- <body> 元素，包含了所有會顯示於網頁瀏覽者眼前的內容。 無論是文字、圖片、影面、互動遊戲...等。 -->

<body>
    <!-- 文件標題 -->
    <h1>An Pepe</h1>
    <!-- 嵌入圖片 -->
    <img src="images/pepe.jpg" alt="An pepe">
    <img src="images/pepe.jpg" alt="An pepe">
    <!-- 一行文字 -->
    <p>Say Hi to Pepe!</p>
    <p>Pepe is a symbol of</p>
    <!-- unordered list -->
    <ul>
        <li>technologists</li>
        <li>thinkers</li>
        <li>builders</li>
    </ul>
    <!-- 超連結 -->
    <a href="https://zh.wikipedia.org/wiki/%E4%BD%A9%E4%BD%A9%E8%9B%99">More Information about Pepe</a>
    <hr>
    <!-- 按鈕 -->
    <button>Change user</button>
    <!-- 載入JavaScript -->
    <script src="scripts/main.js"></script>
</body>

</html>
